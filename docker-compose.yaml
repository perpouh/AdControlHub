version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: rails_app
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec puma -C config/puma.rb"
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
      - tmp:/app/tmp
      - public:/app/public
      - log:/app/log
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      RAILS_ENV: development
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_DATABASE: ${POSTGRES_DB}

  db:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Tokyo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    build: ./containers/nginx
    command: >
      /bin/bash -c
      "envsubst '$$NGINX_SERVER_NAME $$NGINX_SERVER_PORT' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    environment:
      - TZ=Asia/Tokyo
      - NGINX_SERVER_NAME=localhost
      - NGINX_SERVER_PORT=80
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - tmp:/app/tmp
      - public:/app/public
    depends_on:
      - app

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  
  batch:
    build: ./containers/batch
    depends_on:
      - redis
      - db
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./containers/batch:/app
    command: tail -f /dev/null

  frontend:
    build: ./containers/frontend
    container_name: frontend
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped

  apigw:
    build: ./containers/apigw
    container_name: apigw
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Tokyo
      - LAMBDA_URL=http://lambda:5000/register
      - LAMBDA_VERIFY_URL=http://lambda:5000/verify
    restart: unless-stopped

  lambda:
    build: ./containers/lambda
    container_name: lambda
    ports:
      - "5001:5000"
    environment:
      - TZ=Asia/Tokyo
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - DYNAMO_TABLE=user_otps
      - MAILHOG_URL=http://mailhog:8025
    depends_on:
      - dynamodb-local
      - mailhog
    restart: unless-stopped

  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: -jar DynamoDBLocal.jar -inMemory -sharedDb
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  postgres_data:
  bundle:
  tmp:
  public:
  log:
  redis-data:
